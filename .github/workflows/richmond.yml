name: Monthly Richmond CA Scrape

on:
  schedule:
    # Richmond updates monthly — check twice daily on 1st-5th
    - cron: '0 10,18 1-5 * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Richmond scraper
        run: python richmond/scrape.py

      - name: Show results
        run: python -c "import json; d=json.load(open('richmond/data/latest.json')); print(f'{len(d)} records')"

      - name: Check for changes
        id: check
        run: |
          git diff --quiet richmond/data/latest.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add richmond/data/
          git commit -m "Update Richmond CA data $(date -u +%Y-%m-%d)"
          git push
