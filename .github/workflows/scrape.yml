name: Monthly CompStat Scrape

on:
  schedule:
    # Run on the 10th of every month at 10:00 UTC
    - cron: '0 10 10 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node scrape.js --json > data/latest.json

      - name: Archive monthly snapshot
        run: |
          MONTH=$(date -u +%Y-%m)
          cp data/latest.json "data/${MONTH}.json"

      - name: Show results
        run: cat data/latest.json | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8'));const months=new Set(d.map(r=>r.month));console.log(d.length+' records, '+months.size+' months')"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          MONTH=$(date -u +%Y-%m)
          git diff --cached --quiet || git commit -m "Update CompStat data ${MONTH}"
          git push
