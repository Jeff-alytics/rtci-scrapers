name: Monthly ARJIS Scrape

on:
  schedule:
    # Run on the 12th of every month at 10:00 UTC (2 days after CompStat)
    - cron: '0 10 12 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arjis
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper (last 24 months)
        run: python scrape.py --recent 24 --json > data/latest.json

      - name: Archive monthly snapshot
        run: |
          MONTH=$(date -u +%Y-%m)
          cp data/latest.json "data/${MONTH}.json"

      - name: Show results
        run: python -c "import json; d=json.load(open('data/latest.json')); agencies=set(r['agency'] for r in d); print(f'{len(d)} records, {len(agencies)} agencies')"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          MONTH=$(date -u +%Y-%m)
          git diff --cached --quiet || git commit -m "Update ARJIS data ${MONTH}"
          git push
